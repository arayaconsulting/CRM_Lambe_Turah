<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Kasir - Lambe Turah</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #121212; color: #fff; padding-bottom: 50px; }
        .main-container { max-width: 500px; margin: auto; padding: 15px; }
        .nav-pills { background: #222; border-radius: 15px; padding: 5px; margin-bottom: 25px; }
        .nav-pills .nav-link { color: #fff; font-weight: 700; border-radius: 12px; font-size: 13px; }
        .nav-pills .nav-link.active { background: #d32f2f !important; }
        .card-custom { background: #fff; border-radius: 20px; color: #333; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-judes { background: #d32f2f; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        .btn-success-custom { background: #27ae60; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        .btn-warning-custom { background: #e67e22; color: #fff; border-radius: 12px; font-weight: 800; padding: 12px; border: none; width: 100%; }
        .result-box { display: none; border-radius: 15px; }
        .reminder-box { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-bottom: 10px; transition: 0.3s; }
        .badge-notif { background: #d32f2f; font-size: 10px; padding: 4px 8px; border-radius: 5px; color: #fff; font-weight: 800; text-transform: uppercase; }
        label { font-size: 11px; letter-spacing: 1px; color: #666; font-weight: 800; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="main-container">
    
    <!-- HEADER PANEL KASIR BERLOGO -->
    <div class="text-center mt-3 mb-4">
        <div style="width: 80px; height: 80px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
            <img src="logo.png" style="max-width: 100%; max-height: 100%; object-fit: contain;" alt="Logo Lambe Turah">
        </div>
        <h4 class="font-weight-bold mb-0" style="letter-spacing: 2px; color: #d32f2f;">LAMBE TURAH</h4>
        <p class="small text-white-50 text-uppercase">Panel CRM Kasir & Kontrol Poin</p>
    </div>

    <!-- Pilihan Menu Navigasi Kasir -->
    <ul class="nav nav-pills nav-fill shadow-sm" role="tablist">
        <li class="nav-item"><a class="nav-link active" data-toggle="pill" href="#tab-poin">INPUT POIN</a></li>
        <li class="nav-item"><a class="nav-link" data-toggle="pill" href="#tab-tukar">TUKAR POIN</a></li>
        <li class="nav-item"><a class="nav-link" data-toggle="pill" href="#tab-voucher">CEK VOUCHER</a></li>
    </ul>

    <div class="tab-content">
        <!-- TAB 1: INPUT TRANSAKSI / TAMBAH POIN -->
        <div class="tab-pane fade show active" id="tab-poin">
            <div class="card-custom p-4">
                <form id="formPoin">
                    <input type="hidden" name="action" value="updateTransaksi">
                    <div class="form-group">
                        <label>WA MEMBER</label>
                        <input type="tel" name="hp" class="form-control" placeholder="08xxxxxxxx" required style="border-radius:10px;">
                    </div>
                    <div class="form-group">
                        <label>TOTAL TRANSAKSI (RP)</label>
                        <input type="number" name="nominal" class="form-control" placeholder="Kelipatan Rp 20.000 = 1 Poin" required style="border-radius:10px;">
                    </div>
                    <button type="submit" class="btn-success-custom shadow">SIMPAN TRANSAKSI</button>
                </form>
                <div id="resultPoin" class="mt-3 alert alert-success text-center shadow-sm text-dark border-0 result-box">
                    <h6 class="font-weight-bold mb-1" id="resPoinNama"></h6>
                    <h4 class="font-weight-bold" id="resPoinTotal"></h4>
                    <a id="btnWA" href="#" target="_blank" class="btn btn-dark btn-sm btn-block mt-2 font-weight-bold text-white shadow-sm">KIRIM UPDATE KE WA</a>
                </div>
            </div>
        </div>

        <!-- TAB 2: PENUKARAN REWARD HADIAH POIN -->
        <div class="tab-pane fade" id="tab-tukar">
            <div class="card-custom p-4">
                <form id="formTukar">
                    <input type="hidden" name="action" value="tukarPoin">
                    <div class="form-group">
                        <label>WA MEMBER</label>
                        <input type="tel" name="hp" class="form-control" placeholder="08xxxxxxxx" required style="border-radius:10px;">
                    </div>
                    <div class="form-group">
                        <label>PILIH ITEM REWARD</label>
                        <select name="jumlah_tukar" class="form-control" required style="border-radius:10px; height:auto; padding:10px; font-weight:700;">
                            <option value="15">15 Poin - Gratis Es Teh</option>
                            <option value="20">20 Poin - Gratis Nasi</option>
                            <option value="25">25 Poin - Gratis Usus</option>
                            <option value="30">30 Poin - Gratis Kerang</option>
                            <option value="40">40 Poin - Gratis 1 Porsi Ceker + Nasi</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-warning-custom shadow">PROSES POTONG POIN</button>
                </form>
                <div id="resultTukar" class="mt-3 alert alert-warning text-center shadow-sm text-dark border-0 result-box">
                    <h6 class="font-weight-bold mb-1" id="resTukarNama"></h6>
                    <h4 class="font-weight-bold" id="resTukarTotal"></h4>
                    <a id="btnWATukar" href="#" target="_blank" class="btn btn-dark btn-sm btn-block mt-2 font-weight-bold text-white shadow-sm">KIRIM STRUK TUKAR KE WA</a>
                </div>
            </div>
        </div>

        <!-- TAB 3: VALIDASI VOUCHER OPENING -->
        <div class="tab-pane fade" id="tab-voucher">
            <div class="card-custom p-4 text-center">
                <form id="formVoucher">
                    <input type="hidden" name="action" value="claimVoucher">
                    <div class="form-group">
                        <label>MASUKKAN KODE VOUCHER</label>
                        <input type="text" name="kode_voucher" class="form-control text-center font-weight-bold text-danger" style="font-size: 24px; border-radius:10px;" placeholder="LT-XXXX" required>
                    </div>
                    <button type="submit" class="btn-judes shadow">VALIDASI KODE VOUCHER</button>
                </form>
                <div id="resultVoucher" class="mt-3 p-3 border-0 shadow-sm text-dark result-box">
                    <h5 class="font-weight-bold mb-1" id="resVStatus"></h5>
                    <div class="text-left small mt-2">
                        <div class="d-flex justify-content-between"><span>Nama:</span><b id="resVNama">-</b></div>
                        <div class="d-flex justify-content-between"><span>Pekerjaan:</span><b id="resVPekerjaan">-</b></div>
                        <div class="d-flex justify-content-between"><span>Saldo Poin Saat Ini:</span><b id="resVPoin">-</b></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- AGENDA NOTIFIKASI CRM -->
    <div class="mt-5 mb-3 d-flex align-items-center justify-content-center">
        <div style="flex:1; height:1px; background:#333;"></div>
        <h6 class="mx-3 font-weight-bold text-warning mb-0" style="letter-spacing: 1px;">🔔 PENGINGAT CRM HARI INI</h6>
        <div style="flex:1; height:1px; background:#333;"></div>
    </div>

    <div id="reminderList" class="text-left">
        <p class="text-center text-white-50 small py-4">Mengecek data agenda...</p>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // URL WEB APP APPS SCRIPT YANG TELAH DIPERBARUI
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwVQvibsM0l9dPEz5l1ahpeTfjH8xy1zdN8ZarlG-xtfG6wLyj3WOUbcO2Edlpij1t_/exec';

    // Aksi Klik Sapa WA (Konfirmasi Sapaan & Otomatis Bersihkan Layar)
    function archiveNotif(noHP, waURL) {
        window.open(waURL, '_blank');
        fetch(scriptURL + "?action=konfirmasiSapaan&hp=" + noHP, { method: 'POST' })
        .then(() => {
            setTimeout(() => { loadReminders(); }, 1500); // Otomatis me-refresh list agar nama langsung hilang
        });
    }

    // Load Data Pengingat CRM (H-1 Ultah & 10 Hari Absen)
    function loadReminders() {
        const list = document.getElementById('reminderList');
        list.innerHTML = "<p class='text-center text-white-50 small py-4'>Memperbarui agenda CRM...</p>";
        
        fetch(scriptURL + "?action=getReminders")
        .then(res => res.json())
        .then(data => {
            list.innerHTML = "";
            if(data.length === 0) {
                list.innerHTML = "<p class='text-center small text-white-50 py-4'>Semua beres! Tidak ada agenda sapaan hari ini.</p>";
                return;
            }
            data.forEach(item => {
                const waURL = "https://wa.me/" + item.hp + "?text=" + encodeURIComponent(item.pesan);
                list.innerHTML += `
                    <div class="reminder-box d-flex justify-content-between align-items-center shadow-sm">
                        <div>
                            <span class="badge-notif" style="${item.tipe.includes('ULTAH') ? 'background:#e74c3c;' : 'background:#e67e22;'}">${item.tipe}</span>
                            <div class="font-weight-bold mt-1 text-white">${item.nama}</div>
                        </div>
                        <button onclick="archiveNotif('${item.hp}', '${waURL}')" class="btn btn-sm btn-primary font-weight-bold" style="border-radius:8px;">SAPA WA</button>
                    </div>`;
            });
        }).catch(() => {
            list.innerHTML = "<p class='text-center small text-white-50 py-4'>Gagal memuat agenda sapaan.</p>";
        });
    }

    // 1. Submit Tambah Poin
    document.getElementById('formPoin').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        btn.innerText = "Memproses..."; btn.disabled = true;
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                document.getElementById('resultPoin').style.display = 'block';
                document.getElementById('resPoinNama').innerText = res.nama;
                document.getElementById('resPoinTotal').innerText = res.totalPoin + " POIN";
                document.getElementById('btnWA').href = "https://wa.me/" + res.wa + "?text=" + encodeURIComponent(res.pesan);
                this.reset();
            } else { alert(res.message); }
            btn.innerText = "SIMPAN TRANSAKSI"; btn.disabled = false;
        });
    });

    // 2. Submit Tukar Poin
    document.getElementById('formTukar').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        btn.innerText = "Memproses..."; btn.disabled = true;
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            if(res.success) {
                document.getElementById('resultTukar').style.display = 'block';
                document.getElementById('resTukarNama').innerText = res.nama;
                document.getElementById('resTukarTotal').innerText = "SISA: " + res.totalPoin + " POIN";
                document.getElementById('btnWATukar').href = "https://wa.me/" + res.wa + "?text=" + encodeURIComponent(res.pesan);
                this.reset();
            } else { alert(res.message); }
            btn.innerText = "PROSES POTONG POIN"; btn.disabled = false;
        });
    });

    // 3. Submit Validasi Voucher
    document.getElementById('formVoucher').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        btn.innerText = "Mengecek..."; btn.disabled = true;
        fetch(scriptURL, { method: 'POST', body: new FormData(this)})
        .then(res => res.json())
        .then(res => {
            const resDiv = document.getElementById('resultVoucher');
            resDiv.style.display = 'block';
            if(res.success) {
                resDiv.className = "mt-3 p-3 alert alert-success text-dark border-0 shadow-sm";
                document.getElementById('resVStatus').innerText = "KODE VALID! ✅";
                document.getElementById('resVNama').innerText = res.nama;
                document.getElementById('resVPekerjaan').innerText = res.pekerjaan;
                document.getElementById('resVPoin').innerText = res.poin + " Poin";
                this.reset();
            } else {
                resDiv.className = "mt-3 p-3 alert alert-danger text-dark border-0 shadow-sm";
                document.getElementById('resVStatus').innerText = res.message + " ❌";
                document.getElementById('resVNama').innerText = "-";
            }
            btn.innerText = "VALIDASI KODE VOUCHER"; btn.disabled = false;
        });
    });

    window.onload = loadReminders;
</script>
</body>
</html>
